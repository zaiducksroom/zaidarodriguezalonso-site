<div class="project">

<div class="project-title" id="first">First Appointment</div>

<div class="project-flex">

<div>

<p>A healthcare booking UX guiding users from symptoms to the correct specialist.</p>

<h2>CONTEXT</h2>

<p><strong>Problem:</strong> Users must compare doctors while stressed and cognitively overloaded.<br>
<strong>Constraint:</strong> Limited time, high emotional pressure, fragmented medical information.<br>
<strong>Goal:</strong> Reduce cognitive load and guide users toward the right specialist with clarity.</p>

<h2>ROLE</h2>

<p>UX research, service flow design, interaction design, prototyping.</p>

<h2>TOOLS</h2>

<p>Figma · UX flows · Service mapping</p>

<h2>DESIGN REASONING</h2>

<p>Early exploration showed that asking users to choose a specialist directly increased hesitation and anxiety. I decided to reverse the entry logic and start from symptoms instead. This shift reduced decision friction and created a guided, step-by-step experience aligned with user mental models.</p>

<h2>SOLUTION</h2>

<ul>
<li>Symptom-first entry</li>
<li>Guided specialist recommendation</li>
<li>Reduced decision friction</li>
</ul>

<h2>IMPACT</h2>

<p>The redesigned flow improves clarity at first interaction and supports users in high-stress contexts by simplifying the path to care.</p>

</div>

<img src="images/firstappointment-match.png" class="project-image heroimg">

</div>
</div>

<p>Queue UX redesign improving perceived control during service waiting.</p>

<h2>CONTEXT</h2>

<p><strong>Problem:</strong> Users could not understand queue progression and felt uncertainty while waiting.<br>
<strong>Constraint:</strong> Limited system transparency and delayed feedback.<br>
<strong>Goal:</strong> Improve perceived control without altering backend logic.</p>

<h2>ROLE</h2>

<p>UX architecture, information design, system feedback modelling.</p>

<h2>TOOLS</h2>

<p>Figma · Flow modelling · UX states</p>

<h2>DESIGN REASONING</h2>

<p>Research indicated that uncertainty was more stressful than waiting time itself. Instead of focusing on countdown timers, I prioritized continuous visibility and system explanation to restore a sense of control.</p>

<h2>SOLUTION</h2>

<ul>
<li>Continuous system visibility</li>
<li>Progress-based feedback instead of time countdown</li>
<li>Clear explanation of delays</li>
</ul>

<h2>IMPACT</h2>

<p>The redesign shifts the experience from passive waiting to informed progression, improving emotional perception of time.</p>

</div>

<img src="images/waiting-main.png" class="project-image">

</div>
</div>

<strong>Constraint:</strong> Digital environments favor browsing over contemplation.<br>
<strong>Goal:</strong> Create a perception-first experience centered on one artwork at a time.</p>

<h2>ROLE</h2>

<p>Concept design, interaction modelling, emotional pacing design.</p>

<h2>TOOLS</h2>

<p>Figma · Narrative UX · Interaction prototyping</p>

<h2>DESIGN REASONING</h2>

<p>I intentionally removed collection-heavy interfaces and reduced choice overload. By slowing navigation and focusing on a single artwork, the experience invites observation rather than consumption.</p>

<h2>SOLUTION</h2>

<ul>
<li>Single artwork focus</li>
<li>Slow navigation pacing</li>
<li>Observation-first interaction</li>
</ul>

<h2>IMPACT</h2>

<p>The system reframes digital museum interaction as a contemplative experience rather than a catalog exploration.</p>

<p><strong>Claridad del problema:</strong> Reservar una cita médica suele obligar al usuario a comparar especialistas en un momento de estrés, incertidumbre y sobrecarga cognitiva.</p>

<h2>CONTEXTO</h2>
<p>El flujo original asumía que el usuario sabía qué especialista necesitaba. Las entrevistas revelaron dudas frecuentes, retrocesos en la navegación y ansiedad durante la toma de decisión.</p>

<h2>ROL</h2>
<p>Lideré la síntesis de investigación UX, rediseño del flujo de servicio, definición de lógica de interacción y prototipado de alta fidelidad.</p>

<h2>DECISIÓN DE DISEÑO</h2>
<p>Invertí la lógica de entrada. En lugar de comenzar por “Elegir especialista”, el proceso inicia desde síntomas. Esto transforma la experiencia de una comparación exigente a un recorrido guiado.</p>

<h2>CÓMO LOS INSIGHTS MOLDEARON EL RESULTADO</h2>
<p>Las entrevistas mostraron que el estado emocional influía en errores de decisión. Reduje el número de opciones visibles por paso, introduje progresión gradual y estructuré la interacción como un acompañamiento en lugar de un directorio abierto.</p>

<h2>IMPACTO</h2>
<p>El resultado es una primera interacción más calmada, menor vacilación y una progresión clara hacia la atención médica.</p>
