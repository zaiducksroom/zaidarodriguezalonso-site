<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>zaiduck’s room</title>

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap">

<style>

body{
margin:0;
background:#fffdf9;
font-family:'IBM Plex Mono', monospace;
font-weight:300;
font-size:14px;
letter-spacing:0.05px;
color:#444;

height:100vh;
overflow:hidden;

display:flex;
align-items:center;
justify-content:center;

opacity:0;
transition:opacity 1.6s ease;
}

body.visible{opacity:1;}

.wrapper{
display:flex;
align-items:center;
gap:72px;
width:90vw;
max-width:1200px;
}

.intro{max-width:240px;}

.fade{
opacity:0;
transform:translateY(8px);
transition:opacity 1.6s ease, transform 1.6s ease;
}

.fade.visible{
opacity:1;
transform:translateY(0);
}

h1{
font-family:Georgia, serif;
font-size:24px;
font-weight:normal;
margin-bottom:6px;
}

.sub-english{
margin-top:4px;
font-size:13px;
color:#8a8a8a;
}

.idiomas{
margin-top:22px;
font-size:12px;
display:flex;
gap:14px;
opacity:0;
transform:translateY(6px);
transition:opacity 1.8s ease, transform 1.8s ease;
}

.idiomas.visible{
opacity:1;
transform:translateY(0);
}

.idiomas span{
cursor:pointer;
color:#9a9a9a;
}

.idiomas .activo{color:#4a4a4a;}

.room{
position:relative;
}

.room img{
height:82vh;
filter:blur(6px);
transform:scale(1.02);
transition:
filter 1.4s cubic-bezier(.22,.7,.2,1),
transform 1.8s cubic-bezier(.22,.7,.2,1);
}

.room.activa img{
filter:blur(0);
transform:scale(1);
}

/* HALO */

.cama-luz{
position:fixed;
width:150px;
height:150px;
border-radius:50%;
pointer-events:none;

background:radial-gradient(
circle,
rgba(255,248,230,.85),
rgba(255,248,230,.35),
transparent 70%
);

opacity:0;
transition:opacity .8s ease, transform .8s ease;
}

/* VELO */

.velo{
position:fixed;
width:140px;
height:140px;
left:46%;
top:63%;
transform:translate(-50%,-50%) scale(0);
border-radius:50%;
background:#1f1f1f;
pointer-events:none;
z-index:9999;
transition:transform 1.6s cubic-bezier(.22,.7,.2,1);
}

body.transicion-activa .velo{
transform:translate(-50%,-50%) scale(28);
}

/* HITBOX */

.hitbox-map{
position:absolute;
top:0;
left:0;
height:82vh;
width:auto;
pointer-events:none;
}

.cama-hitbox{
fill:transparent;
pointer-events:auto;
cursor:pointer;

opacity:0;
transition:opacity .6s ease;
}

.room.activa .cama-hitbox{
opacity:1;
}


</style>
</head>

<body>

<div class="wrapper">

<div class="intro">
<h1 class="fade">zaiduck’s room</h1>
<p class="fade">en construcción diaria</p>
<p class="sub-english fade">becoming, slowly</p>

<div class="idiomas">
<span data-lang="es">español</span>
<span data-lang="en">english</span>
</div>
</div>

<div class="room">

<img src="habitacion 1.jpeg">

<svg class="hitbox-map" viewBox="0 0 1024 1024">

<polygon
points="571,1022 511,969 371,911 276,891 226,887 186,879 145,855 139,808 108,781 83,529 331,494 346,571 369,572 412,588 418,637 444,660 462,676 766,742 767,1021"
class="cama-hitbox"
/>

</svg>

<div class="cama-luz"></div>

<div class="velo"></div>

</div>

<script>

/* ===============================
ENTRADA CINE
=============================== */

setTimeout(()=>document.body.classList.add("visible"),120);

const fades=document.querySelectorAll(".fade");

setTimeout(()=>fades[0].classList.add("visible"),700);
setTimeout(()=>fades[1].classList.add("visible"),1600);
setTimeout(()=>fades[2].classList.add("visible"),2500);

setTimeout(()=>{
document.querySelector(".idiomas").classList.add("visible");
},3600);


/* ===============================
LANG
=============================== */

localStorage.removeItem("lang");

let idiomaSeleccionado=false;

const botones=document.querySelectorAll(".idiomas span");
const room=document.querySelector(".room");
const cama=document.querySelector(".cama-hitbox");
const luz=document.querySelector(".cama-luz");

let ultimaInteraccion = Date.now();
let pulsoActivo = false;

botones.forEach(btn=>{
btn.addEventListener("click",()=>{

const lang=btn.dataset.lang;

localStorage.setItem("lang",lang);
document.documentElement.setAttribute("lang",lang);

botones.forEach(b=>b.classList.remove("activo"));
btn.classList.add("activo");

room.classList.add("activa");
idiomaSeleccionado=true;

});
});


/* ===============================
RESPIRACIÓN BASE
=============================== */

let t=0;

function latido(){

t+=0.002;

room.style.transform=
`translate(${Math.sin(t)*2}px,${Math.cos(t)*1.5}px)`;

requestAnimationFrame(latido);

}

latido();


/* ===============================
MAPPING PERCEPTIVO
=============================== */

let mouseX=0;
let mouseY=0;

let baseX=0;
let baseY=0;

document.addEventListener("mousemove",(e)=>{

mouseX=e.clientX;
mouseY=e.clientY;

ultimaInteraccion = Date.now();

const rect=luz.getBoundingClientRect();

/* mover halo */

luz.style.left=(mouseX-rect.width/2)+"px";
luz.style.top=(mouseY-rect.height/2)+"px";

/* movimiento habitación */

baseX=(mouseX/window.innerWidth-.5)*6;
baseY=(mouseY/window.innerHeight-.5)*4;

room.style.transform=`translate(${baseX}px,${baseY}px)`;

});


function detectarCercania(){

if(!idiomaSeleccionado){

luz.style.opacity="0";
requestAnimationFrame(detectarCercania);
return;

}

const rect=cama.getBoundingClientRect();

const cx=rect.left+rect.width/2;
const cy=rect.top+rect.height/2;

const dx=mouseX-cx;
const dy=mouseY-cy;

const dist=Math.sqrt(dx*dx+dy*dy);

setInterval(pulsoCama, 2000);

function pulsoCama(){

if(!idiomaSeleccionado) return;

if(Date.now() - ultimaInteraccion > 6000 && !pulsoActivo){

pulsoActivo = true;

luz.style.opacity = "0.5";
luz.style.transform = "scale(1.6)";

setTimeout(()=>{
luz.style.opacity = "0";
luz.style.transform = "scale(1)";
pulsoActivo = false;
},1200);

}

}


/* halo aparece */

if(dist<260){

luz.style.opacity="1";
luz.style.transform="scale(1.2)";

}else{

luz.style.opacity="0";
luz.style.transform="scale(1)";

}


/* refuerzo perceptivo cerca */

if(dist<140){

room.style.transform=`translate(${baseX}px,${baseY}px) scale(1.02)`;

}else{

room.style.transform=`translate(${baseX}px,${baseY}px)`;

}


requestAnimationFrame(detectarCercania);

}

detectarCercania();

/* ===============================
TRANSICIÓN
=============================== */



cama.addEventListener("click",()=>{

if(!idiomaSeleccionado) return;

luz.style.opacity="1";
luz.style.transform="scale(1.5)";

room.style.transition="transform 2.2s cubic-bezier(.22,.7,.2,1)";
room.style.transform="scale(1.05)";

setTimeout(()=>{
document.body.classList.add("transicion-activa");
},260);

setTimeout(()=>{
window.location.href="conciencia.html";
},2400);

});

</script>
</body>
</html>
