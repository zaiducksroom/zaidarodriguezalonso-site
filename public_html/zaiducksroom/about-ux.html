<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zaiduck’s Room — UX Project</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ========= BASE ========= */

body{
background:linear-gradient(
to bottom,
#fffefb,
#fff8f3,
#fffdfa
);

color:#3f3f3f;
font-family:Georgia, serif;
line-height:1.75;

padding:80px 30px;
max-width:820px;
margin:auto;

opacity:0;
transition:opacity 1.6s ease;
}

body.visible{opacity:1;}


/* ========= LUZ ========= */

.luz-editorial{
position:fixed;
inset:-20%;
pointer-events:none;
z-index:-1;

background:
radial-gradient(ellipse at 78% 12%, rgba(255,220,170,.28), transparent 45%),
radial-gradient(ellipse at 10% 40%, rgba(170,210,255,.18), transparent 50%),
radial-gradient(ellipse at 90% 70%, rgba(255,200,150,.18), transparent 60%);

filter:blur(55px);
opacity:.7;

animation:luzFlota 38s ease-in-out infinite;
}

@keyframes luzFlota{
0%{transform:translate3d(0,0,0);}
50%{transform:translate3d(-2%,1.5%,0);}
100%{transform:translate3d(0,0,0);}
}


/* ========= HEADER ========= */

.header{
font-family:'IBM Plex Mono', monospace;
font-size:11px;
letter-spacing:.09em;
margin-bottom:80px;
display:flex;
justify-content:space-between;
color:#7a7a7a;
}

/* ⭐ LINK ATMOSFÉRICO REAL */

.header a{
text-decoration:none;
border-bottom:1px solid #e2e2e2;
padding-bottom:2px;
color:inherit;
cursor:pointer;
transition:border-color .35s ease, opacity .35s ease;
}

.header a:hover{
border-bottom:1px solid #888;
}


/* ========= TITLES ========= */

h1{
font-size:30px;
font-weight:normal;
margin-bottom:36px;
}

h2{
font-family:'IBM Plex Mono', monospace;
font-size:11px;
letter-spacing:.17em;
margin-top:70px;
margin-bottom:22px;
color:#8a8a8a;
}


/* ========= TEXT ========= */

p{margin-bottom:20px;}

ul{
margin-left:18px;
margin-bottom:20px;
}

li{margin-bottom:6px;}


/* ========= ENTRADA ========= */

.fade{
opacity:0;
transform:translateY(18px);
transition:opacity 1.8s ease, transform 1.8s ease;
}

.fade.visible{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div class="luz-editorial"></div>

<div class="header">
<span>Zaida Rodríguez Alonso — UX Designer</span>

<!-- ⭐ CAMBIO CLAVE: vuelve a INDEX con transición -->
<a id="volver">← back</a>

</div>

<div id="contenido"></div>

<script>

/* ========= idioma global ========= */

let lang=localStorage.getItem("lang");

if(!lang){
const nav=navigator.language.slice(0,2);
lang=nav==="es"?"es":"en";
localStorage.setItem("lang",lang);
}

document.documentElement.setAttribute("lang",lang);


/* ========= textos ========= */

const textos={

en:`

<div class="fade"><h1>Zaiduck’s Room — UX Experimental Project</h1></div>

<div class="fade"><p>A research-driven UX exploration into pacing, perception, and emotionally responsive digital environments.</p></div>

<div class="fade"><h2>WHAT THIS IS</h2></div>
<div class="fade"><p>Zaiduck’s Room explores how digital environments regulate attention and emotional state through pacing and perceptual signals.</p></div>

<div class="fade"><h2>ROLE</h2></div>
<div class="fade"><p>Concept, UX framing, interaction design, pacing system, visual direction, implementation.</p></div>

<div class="fade"><h2>DESIGN GOAL</h2></div>
<div class="fade">
<ul>
<li>Navigation guided by perception</li>
<li>Interaction emerging from environment</li>
<li>Cognitive load regulated through rhythm</li>
</ul>
</div>

<div class="fade"><h2>CONCEPTUAL FOUNDATION</h2></div>
<div class="fade"><p>Awareness → regulation → agency → orientation → renewal → social re-entry.</p></div>
`,

es:`

<div class="fade"><h1>Zaiduck’s Room — Proyecto UX Experimental</h1></div>

<div class="fade"><p>Una exploración UX sobre ritmo, percepción y entornos digitales emocionalmente sensibles.</p></div>

<div class="fade"><h2>QUÉ ES</h2></div>
<div class="fade"><p>Zaiduck’s Room explora cómo los entornos digitales pueden regular atención y estado emocional mediante ritmo y señales perceptivas.</p></div>

<div class="fade"><h2>ROL</h2></div>
<div class="fade"><p>Concepto, investigación UX, diseño de interacción, sistema de ritmo, dirección visual e implementación.</p></div>

<div class="fade"><h2>OBJETIVO</h2></div>
<div class="fade">
<ul>
<li>Navegación guiada por percepción</li>
<li>Interacción emergente del entorno</li>
<li>Regulación cognitiva mediante tiempo</li>
</ul>
</div>

<div class="fade"><h2>FUNDAMENTO</h2></div>
<div class="fade"><p>Conciencia → regulación → agencia → orientación → renovación → reentrada social.</p></div>
`
};

document.getElementById("contenido").innerHTML=textos[lang];


/* ========= entrada ========= */

setTimeout(()=>document.body.classList.add("visible"),120);


/* ========= fade blocks ========= */

const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting) e.target.classList.add("visible");
});
},{threshold:.18});

document.querySelectorAll(".fade").forEach(el=>obs.observe(el));


/* =====================================================
⭐ VOLVER A INDEX — TRANSICIÓN SUAVE REAL
===================================================== */

document.getElementById("volver").addEventListener("click",()=>{

document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="index.html";
},900);

});

</script>

</body>
</html>
