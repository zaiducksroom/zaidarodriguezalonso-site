<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>orienta</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
position:relative;

opacity:0;
transition:opacity 2.6s cubic-bezier(.65,0,.35,1);

background:
radial-gradient(3px 3px at 62% 28%, rgba(255,255,255,0.92), transparent),
radial-gradient(2px 2px at 18% 22%, rgba(255,245,235,0.45), transparent),
radial-gradient(1.5px 1.5px at 72% 38%, rgba(255,245,235,0.35), transparent),
radial-gradient(circle at 50% 140%,
#22265a 0%,#161938 35%,#0c0f22 65%,#050711 85%,#02030a 100%);
}

body.visible{opacity:1;}


/* ⭐ ESTRELLA ÚNICA */

.estrella{

position:absolute;

top:55%;
left:22%;

width:7px;
height:7px;

border-radius:50%;

background:rgba(235,230,255,0.96);

box-shadow:
0 0 14px rgba(210,200,255,0.95),
0 0 46px rgba(170,150,255,0.75);

cursor:pointer;

transform:scale(1.45);
}


/* respiración */

.estrella::after{
content:"";
position:absolute;
inset:-18px;
border-radius:50%;

background:radial-gradient(
circle,
rgba(190,180,255,0.55),
transparent 70%
);

animation:respira 9s ease-in-out infinite;
}

@keyframes respira{

0%{transform:scale(.85);opacity:.35;}
50%{transform:scale(2.4);opacity:1;}
100%{transform:scale(.85);opacity:.35;}

}


/* nacimiento */

.luz-nacimiento{
position:fixed;
width:12px;
height:12px;
transform:translate(-50%,-50%) scale(1);
border-radius:50%;

background:radial-gradient(circle,
rgba(255,245,220,.95),
rgba(255,220,170,.55),
rgba(255,200,150,.25),
transparent 70%);

opacity:0;
pointer-events:none;

transition:
transform 3.2s cubic-bezier(.22,.61,.36,1),
opacity 2s ease;
}

body.nace .luz-nacimiento{
opacity:1;
transform:translate(-50%,-50%) scale(160);
}


.velo{
position:fixed;
inset:0;
background:linear-gradient(to bottom,#f6e6d1,#f9f2e8);
opacity:0;
pointer-events:none;
transition:opacity 2.4s cubic-bezier(.65,0,.35,1);
}

body.saliendo .velo{opacity:1;}

</style>
</head>

<body>

<div class="estrella"></div>

<div class="luz-nacimiento"></div>
<div class="velo"></div>

<script>

/* idioma global intacto */

let lang=localStorage.getItem("lang");
if(!lang){
const nav=navigator.language.slice(0,2);
lang=nav==="es"?"es":"en";
localStorage.setItem("lang",lang);
}
document.documentElement.setAttribute("lang",lang);


/* entrada */

setTimeout(()=>document.body.classList.add("visible"),120);


/* click */

const estrella=document.querySelector(".estrella");
const luz=document.querySelector(".luz-nacimiento");

estrella.addEventListener("click",()=>{

const rect=estrella.getBoundingClientRect();

luz.style.left=rect.left+rect.width/2+"px";
luz.style.top=rect.top+rect.height/2+"px";

document.body.classList.add("nace");

setTimeout(()=>document.body.classList.add("saliendo"),2400);

setTimeout(()=>{
window.location.href="amanece.html";
},4200);

});

</script>

</body>
</html>
